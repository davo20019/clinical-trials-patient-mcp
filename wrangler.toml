name = "clinical-trials-patient-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Durable Object binding required by the agents SDK's McpAgent.
# The class is exported from src/index.ts. Session state is held per-connection
# and is ephemeral; no persistent user data is stored.
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "ClinicalTrialsPatientMcp"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ClinicalTrialsPatientMcp"]

# Rate limit: 60 requests per minute per client IP.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[observability]
enabled = true
